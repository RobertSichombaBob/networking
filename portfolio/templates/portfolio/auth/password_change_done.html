{% extends "portfolio/base.html" %}
{% block title %}Password Changed – Deriv.Ed{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden text-center">
                <div class="card-body p-5">
                    <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
                    <h4 class="fw-bold mb-3">Password changed successfully!</h4>
                    <p class="text-secondary mb-4">Your password has been updated. You can now use it to log in.</p>
                    <a href="{% url 'portfolio:my_profile' %}" class="btn btn-copper px-5 py-2 fw-semibold">Go to Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
