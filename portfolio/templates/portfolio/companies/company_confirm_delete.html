{% extends "portfolio/base.html" %}
{% load static %}
{% block title %}Delete Company – Network{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm text-center">
                <div class="card-body p-5">
                    <i class="fas fa-exclamation-triangle fa-5x text-warning mb-4"></i>
                    <h4 class="fw-bold mb-3">Delete “{{ object.name }}”?</h4>
                    <p class="text-secondary mb-4">This action cannot be undone. All associated jobs will be lost.</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger px-4 py-2">Yes, delete</button>
                            <a href="{% url 'portfolio:company_list' %}" class="btn btn-outline-secondary px-4 py-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
